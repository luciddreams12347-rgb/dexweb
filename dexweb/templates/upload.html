{% extends "base.html" %}
{% block title %}Library Upload - {{ site.brand }}{% endblock %}
{% block content %}
<section class="panel">
  <h1>Upload Learning Material</h1>
  {% if message %}<p class="error">{{ message }}</p>{% endif %}
  <form method="post" enctype="multipart/form-data" class="stack">
    <input type="file" name="file" accept=".pdf,.docx,.txt,.png,.jpg,.jpeg,.webp,.gif" required>
    <input type="number" min="1" max="12" name="grade" placeholder="Grade (optional)">
    <input type="text" name="subject" placeholder="Subject" required>
    <input type="text" name="title" placeholder="Title (optional)">
    <textarea name="description" rows="4" placeholder="Description (optional)"></textarea>
    <button type="submit">Upload + Send To Worm</button>
  </form>
  <a class="button ghost" href="{{ url_for('main.library_home') }}">Back</a>
</section>
{% endblock %}
