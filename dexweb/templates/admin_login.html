{% extends "base.html" %}
{% block title %}Admin Login - {{ site.brand }}{% endblock %}
{% block content %}
<section class="panel narrow center page-panel">
  <header class="page-header">
    <h1>Admin Login</h1>
    <p class="hint">Enter the admin password to access the control panel.</p>
  </header>
  <form method="post" class="stack form-panel">
    <input type="password" name="password" placeholder="Admin Password" required autofocus>
    <button type="submit">Login</button>
  </form>
  {% if message %}<p class="error">{{ message }}</p>{% endif %}
  <nav class="page-nav">
    <a class="button ghost" href="{{ url_for('main.index') }}">Back</a>
  </nav>
</section>
{% endblock %}
